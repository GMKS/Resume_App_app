name: resume_builder_app
description: "Resume Builder Flutter App with Node.js Backend"
publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  # Core dependencies for Node.js backend
  http: ^1.1.0
  shared_preferences: ^2.2.3
  path_provider: ^2.1.4
  printing: ^5.11.0
  provider: ^6.0.5
  share_plus: ^12.0.0
  # Removed flutter_email_sender and whatsapp_share2 in favor of share_plus chooser
  image_picker: ^1.1.2
  url_launcher: ^6.2.5
  pdf: ^3.11.0
  path: ^1.9.0
  archive: ^3.6.1

  # UI components
  cupertino_icons: ^1.0.6
  open_file: ^3.5.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/skills.json
