name: resume_builder
description: A modern, professional resume builder app with beautiful templates and seamless export features.

publish_to: "none"

version: 1.0.2+1780675827
environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  google_fonts: ^6.1.0

  # State Management
  flutter_riverpod: ^2.4.9

  # Navigation
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF Generation
  pdf: ^3.12.0
  printing: ^5.14.3
  syncfusion_flutter_pdf: ^27.2.5

  # Image Handling
  image_picker: ^1.1.2

  # Animations
  flutter_animate: ^4.3.0

  # Payment Gateway
  razorpay_flutter: ^1.4.1
  in_app_purchase: ^3.2.3

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  package_info_plus: ^8.0.2
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.2
  http: ^1.1.0
  archive: ^3.6.1
  file_selector: ^1.0.3

  # Icons
  iconsax: ^0.0.8
  font_awesome_flutter: ^10.6.0

  # Firebase (Cloud Sync)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.3
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - .env

  # Using Google Fonts package for Poppins font family
  # No local font assets needed
