name: resume_builder
description: A modern, professional resume builder app with beautiful templates and seamless export features.

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  lottie: ^2.7.0

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Navigation
  go_router: ^13.0.0

  # Storage
  shared_preferences: ^2.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # PDF Generation
  pdf: ^3.12.0
  printing: ^5.14.3
  path_provider: ^2.1.1
  syncfusion_flutter_pdf: ^27.2.5

  # Image Handling
  image_picker: ^1.1.2
  image_cropper: ^8.0.2

  # Animations
  flutter_animate: ^4.3.0
  animations: ^2.0.10

  # Payment Gateway
  razorpay_flutter: ^1.3.6

  # Utils
  uuid: ^4.2.1
  intl: ^0.18.1
  qr_flutter: ^4.1.0
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  http: ^1.1.0
  archive: ^3.6.1
  file_selector: ^1.0.3

  # Icons
  iconsax: ^0.0.8
  font_awesome_flutter: ^10.6.0

  # Firebase (Cloud Sync)
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  google_sign_in: ^6.2.1
  flutter_facebook_auth: ^7.0.1
  flutter_dotenv: ^6.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.7
  hive_generator: ^2.0.1
  riverpod_generator: ^2.3.9

flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/templates/

  # Using Google Fonts package for Poppins font family
  # No local font assets needed
